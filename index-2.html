<head>
<meta charset="UTF-8">

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Cairo:wght@400;600;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:#000;overflow:hidden;height:100vh;width:100vw;font-family:'Cairo',sans-serif;touch-action:none;}
canvas{display:block;position:absolute;top:0;left:0;}
#ui{position:fixed;top:0;left:0;right:0;z-index:100;pointer-events:none;padding:env(safe-area-inset-top,12px) 14px 0;}
.hud-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;}
.hud-box{background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.15);border-radius:14px;padding:5px 12px;backdrop-filter:blur(10px);}
.hud-label{font-size:9px;color:rgba(255,200,0,0.7);letter-spacing:2px;text-transform:uppercase;}
.hud-val{font-family:'Orbitron',sans-serif;font-size:18px;font-weight:900;color:#fff;line-height:1.1;}
#combo-display{position:fixed;top:90px;left:50%;transform:translateX(-50%);z-index:101;pointer-events:none;text-align:center;transition:opacity 0.3s;}
.combo-text{font-family:'Orbitron',sans-serif;font-size:28px;font-weight:900;color:#ffd700;text-shadow:0 0 20px #ff8800,0 0 40px #ff4400;animation:comboPop 0.3s ease;}
@keyframes comboPop{0%{transform:scale(1.5);}100%{transform:scale(1);}}
#screen{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.s-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 30%,#0a0a2e 0%,#000000 70%);}
.s-content{position:relative;z-index:1;text-align:center;padding:20px;}
.game-logo{font-family:'Orbitron',sans-serif;font-size:42px;font-weight:900;line-height:1;margin-bottom:6px;}
.logo-star{color:#fff;text-shadow:0 0 30px #00aaff,0 0 60px #0055ff;}
.logo-x{color:#ff3300;text-shadow:0 0 20px #ff3300,0 0 40px #ff0000;}
.s-tagline{color:rgba(100,200,255,0.8);font-size:13px;margin-bottom:30px;}
.btn-play{display:inline-block;padding:16px 48px;background:linear-gradient(135deg,#ff6600,#ff0044);border:none;border-radius:50px;font-family:'Cairo',sans-serif;font-size:20px;font-weight:900;color:#fff;cursor:pointer;box-shadow:0 0 30px rgba(255,60,0,0.5);transition:transform 0.1s;margin:8px;}
.btn-play:active{transform:scale(0.95);}
.btn-secondary{display:inline-block;padding:12px 36px;background:transparent;border:1px solid rgba(255,255,255,0.3);border-radius:50px;font-family:'Cairo',sans-serif;font-size:15px;color:rgba(255,255,255,0.7);cursor:pointer;margin:6px;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:20px 0;text-align:center;}
.stat-item{background:rgba(255,255,255,0.05);border-radius:12px;padding:12px;}
.stat-val{font-family:'Orbitron',sans-serif;font-size:22px;font-weight:900;color:#ffd700;}
.stat-lbl{font-size:11px;color:rgba(255,255,255,0.5);}
/* Controls */
#controls{position:fixed;bottom:0;left:0;right:0;height:160px;z-index:100;display:flex;pointer-events:all;}
.ctrl-zone{flex:1;display:flex;align-items:center;justify-content:center;opacity:0;}
.ctrl-btn{width:70px;height:70px;border-radius:50%;border:2px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:center;font-size:28px;backdrop-filter:blur(5px);transition:background 0.1s,transform 0.1s;}
.ctrl-btn.active{background:rgba(255,255,255,0.15);transform:scale(1.1);}
#ctrl-left{justify-content:flex-start;padding-left:20px;}
#ctrl-right{justify-content:flex-end;padding-right:20px;}
#ctrl-fire{flex:0 0 120px;justify-content:center;}
/* Boss warning */
#boss-warn{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:150;text-align:center;pointer-events:none;display:none;}
.boss-warn-text{font-family:'Orbitron',sans-serif;font-size:32px;font-weight:900;color:#ff0000;text-shadow:0 0 20px #ff0000;animation:bossWarn 0.5s ease infinite alternate;}
@keyframes bossWarn{from{opacity:0.3;transform:scale(0.9);}to{opacity:1;transform:scale(1.1);}}
#dmg-flash{position:fixed;inset:0;background:rgba(255,0,0,0.4);pointer-events:none;opacity:0;z-index:90;transition:opacity 0.1s;}
#level-up{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:150;pointer-events:none;display:none;text-align:center;}
.lvl-text{font-family:'Orbitron',sans-serif;font-size:36px;font-weight:900;color:#00ff88;text-shadow:0 0 30px #00ff88;animation:lvlUp 0.5s ease;}
@keyframes lvlUp{0%{transform:scale(0.5);opacity:0;}100%{transform:scale(1);opacity:1;}}
</style>
</head>
<body>
<canvas id="c"></canvas>

<!-- HUD -->
<div id="ui" style="display:none">
  <div class="hud-row">
    <div class="hud-box">
      <div class="hud-label">النقاط</div>
      <div class="hud-val" id="hScore">0</div>
    </div>
    <div class="hud-box" style="text-align:center">
      <div class="hud-label">المستوى</div>
      <div class="hud-val" id="hLevel">1</div>
    </div>
    <div class="hud-box" id="livesBox">
      <div class="hud-label">الأرواح</div>
      <div class="hud-val" id="hLives">❤️❤️❤️</div>
    </div>
  </div>
  <div style="padding:4px 0">
    <div style="background:rgba(0,0,0,0.5);border-radius:8px;height:6px;overflow:hidden;border:1px solid rgba(255,255,255,0.1)">
      <div id="xpBar" style="height:100%;background:linear-gradient(90deg,#00aaff,#00ffcc);width:0%;transition:width 0.3s;border-radius:8px;box-shadow:0 0 8px #00aaff"></div>
    </div>
  </div>
</div>

<div id="combo-display" style="display:none">
  <div class="combo-text" id="comboText"></div>
</div>

<!-- Screens -->
<div id="screen">
  <div class="s-bg"></div>
  <div id="startScreen" class="s-content">
    <div style="font-size:72px;margin-bottom:10px;filter:drop-shadow(0 0 20px #ff6600)">🚀</div>
    <div class="game-logo">
      <span class="logo-star">نجم الفضاء</span><br>
      <span class="logo-x">X</span>
    </div>
    <div class="s-tagline">⚡ الفضاء في خطر — أنت الأمل الأخير ⚡</div>
    <button class="btn-play" onclick="startGame()">ابدأ المعركة</button>
    <div style="margin-top:16px;color:rgba(255,255,255,0.3);font-size:11px">
      اسحب للتحرك • اضغط للإطلاق • اجمع القوى
    </div>
  </div>
  <div id="overScreen" class="s-content" style="display:none">
    <div style="font-size:56px;margin-bottom:10px">💥</div>
    <div class="game-logo" style="font-size:28px;margin-bottom:4px">
      <span class="logo-star">انتهت</span> <span class="logo-x">المعركة</span>
    </div>
    <div class="stats-grid">
      <div class="stat-item"><div class="stat-val" id="oScore">0</div><div class="stat-lbl">النقاط</div></div>
      <div class="stat-item"><div class="stat-val" id="oLevel">1</div><div class="stat-lbl">المستوى</div></div>
      <div class="stat-item"><div class="stat-val" id="oBest">0</div><div class="stat-lbl">أعلى نقاط</div></div>
      <div class="stat-item"><div class="stat-val" id="oKills">0</div><div class="stat-lbl">الأعداء</div></div>
    </div>
    <button class="btn-play" onclick="startGame()">العب مجدداً</button>
    <button class="btn-secondary" onclick="showStart()">القائمة</button>
  </div>
</div>

<!-- Controls -->
<div id="controls" style="display:none">
  <div class="ctrl-zone" id="ctrl-left"><div class="ctrl-btn" id="btnL">◀</div></div>
  <div class="ctrl-zone" id="ctrl-fire"><div class="ctrl-btn" id="btnF">🔥</div></div>
  <div class="ctrl-zone" id="ctrl-right"><div class="ctrl-btn" id="btnR">▶</div></div>
</div>

<div id="boss-warn"><div class="boss-warn-text">⚠️ BOSS ⚠️</div></div>
<div id="dmg-flash"></div>
<div id="level-up"><div class="lvl-text" id="lvlText">مستوى جديد!</div></div>

<script>
const C = document.getElementById('c');
const ctx = C.getContext('2d');
let W, H;
function resize(){W=C.width=window.innerWidth;H=C.height=window.innerHeight;}
resize();
window.addEventListener('resize',resize);

// State
let gs = 'start';
let score=0,best=parseInt(localStorage.getItem('best')||'0'),level=1,lives=3,kills=0;
let xp=0,xpNeeded=5,combo=0,comboTimer=0,maxCombo=0;
let frame=0,invTimer=0,bossAlive=false,screenShake=0;

// Objects
let player,bullets,enemies,particles,stars,powerups,bossBullets;
let inputL=false,inputR=false,inputF=false;
let lastFire=0,autoFire=true;
let touchStartX=null,playerTargetX=null;

// Enemy patterns
const ENEMY_TYPES = {
  grunt:   {w:30,h:30,hp:1,speed:1.2,pts:10,emoji:'👾',color:'#ff4488',shoot:false},
  scout:   {w:26,h:26,hp:1,speed:2.8,pts:20,emoji:'🛸',color:'#ff8800',shoot:false},
  tank:    {w:46,h:46,hp:4,speed:0.7,pts:50,emoji:'🤖',color:'#8800ff',shoot:true,shootRate:120},
  sniper:  {w:28,h:28,hp:2,speed:1.0,pts:35,emoji:'🎯',color:'#00ff88',shoot:true,shootRate:80},
  bomber:  {w:38,h:38,hp:3,speed:0.5,pts:45,emoji:'💣',color:'#ff4400',shoot:false,explode:true},
  boss:    {w:90,h:90,hp:30,speed:0.8,pts:500,emoji:'👹',color:'#ff0000',shoot:true,shootRate:40,isBoss:true},
};

// Power-up types
const PU_TYPES = ['shield','rapid','spread','bomb','health'];
const PU_COLORS = {shield:'#00aaff',rapid:'#ffaa00',spread:'#ff44ff',bomb:'#ff4400',health:'#ff0044'};
const PU_EMOJIS = {shield:'🛡️',rapid:'⚡',spread:'🌟',bomb:'💥',health:'❤️'};

function initStars(){
  stars=[];
  for(let i=0;i<120;i++) stars.push({
    x:Math.random()*W, y:Math.random()*H,
    speed:0.2+Math.random()*2,
    r:Math.random()*1.8,
    a:Math.random(),
    color:Math.random()>0.95?`hsl(${Math.random()*60+180},100%,80%)`:'#fff'
  });
}

function initGame(){
  score=0;level=1;lives=3;kills=0;xp=0;xpNeeded=5;combo=0;comboTimer=0;frame=0;invTimer=0;bossAlive=false;
  player={
    x:W/2,y:H-130,w:36,h:48,
    speed:6,dx:0,dy:0,
    shield:false,shieldT:0,
    rapid:false,rapidT:0,
    spread:false,spreadT:0,
    fireRate:18
  };
  bullets=[];enemies=[];particles=[];powerups=[];bossBullets=[];
  playerTargetX=W/2;
  initStars();
  updateHUD();
}

function updateHUD(){
  document.getElementById('hScore').textContent=score;
  document.getElementById('hLevel').textContent=level;
  const hearts='❤️'.repeat(lives)+'🖤'.repeat(Math.max(0,3-lives));
  document.getElementById('hLives').textContent=hearts;
  const pct=Math.min(100,(xp/xpNeeded)*100);
  document.getElementById('xpBar').style.width=pct+'%';
}

function spawnEnemy(){
  if(bossAlive) return;
  const avail=['grunt'];
  if(level>=2) avail.push('scout');
  if(level>=3) avail.push('tank');
  if(level>=4) avail.push('sniper');
  if(level>=5) avail.push('bomber');

  // Formation spawns
  const roll=Math.random();
  if(roll<0.15 && level>=2){
    // V formation
    for(let i=0;i<5;i++){
      const t=ENEMY_TYPES.grunt;
      setTimeout(()=>enemies.push(makeEnemy('grunt',W/2+(i-2)*50,-50-Math.abs(i-2)*30)),i*100);
    }
    return;
  }
  if(roll<0.25 && level>=3){
    // Side sweep
    const side=Math.random()<0.5;
    for(let i=0;i<4;i++){
      setTimeout(()=>enemies.push(makeEnemy('scout',side?-40:W+40,80+i*60,side?1:-1)),i*80);
    }
    return;
  }

  const type=avail[Math.floor(Math.random()*avail.length)];
  enemies.push(makeEnemy(type));
}

function makeEnemy(type,startX,startY,dirX){
  const cfg=ENEMY_TYPES[type];
  const x = startX !== undefined ? startX : cfg.w/2+Math.random()*(W-cfg.w);
  const y = startY !== undefined ? startY : -cfg.h;
  const e={
    ...cfg,
    type,
    x, y,
    maxHp:cfg.hp,
    hp:cfg.hp,
    dx: dirX || 0,
    t:0,
    shootTimer:Math.floor(Math.random()*60),
    sway:Math.random()*3-1.5,
    pattern:Math.floor(Math.random()*3)
  };
  return e;
}

function spawnBoss(){
  bossAlive=true;
  const cfg=ENEMY_TYPES.boss;
  const b={
    ...cfg,
    type:'boss',
    x:W/2, y:-100,
    maxHp:cfg.hp,
    hp:cfg.hp*(1+level*0.3),
    t:0,
    shootTimer:0,
    phase:0,
    dx:2
  };
  b.maxHp=b.hp;
  enemies.push(b);
  showBossWarning();
}

function showBossWarning(){
  const w=document.getElementById('boss-warn');
  w.style.display='block';
  setTimeout(()=>w.style.display='none',3000);
}

function shoot(){
  if(player.spread){
    [-25,0,25].forEach(ang=>{
      const rad=ang*Math.PI/180;
      bullets.push({x:player.x,y:player.y-player.h/2,vx:Math.sin(rad)*4,vy:-14,r:5,power:1,color:'#ff88ff'});
    });
  } else {
    bullets.push({x:player.x-8,y:player.y-player.h/2,vx:0,vy:-14,r:4,power:1,color:'#00ccff'});
    bullets.push({x:player.x+8,y:player.y-player.h/2,vx:0,vy:-14,r:4,power:1,color:'#00ccff'});
  }
  // Sound effect via Web Audio
  playSound('shoot');
}

// Web Audio
let audioCtx;
function getAudio(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}
function playSound(type){
  try{
    const a=getAudio();
    const o=a.createOscillator();
    const g=a.createGain();
    o.connect(g); g.connect(a.destination);
    if(type==='shoot'){o.frequency.setValueAtTime(880,a.currentTime);o.frequency.exponentialRampToValueAtTime(440,a.currentTime+0.05);g.gain.setValueAtTime(0.1,a.currentTime);g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.05);}
    else if(type==='explode'){o.type='sawtooth';o.frequency.setValueAtTime(200,a.currentTime);o.frequency.exponentialRampToValueAtTime(50,a.currentTime+0.2);g.gain.setValueAtTime(0.3,a.currentTime);g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.2);}
    else if(type==='powerup'){o.type='sine';o.frequency.setValueAtTime(440,a.currentTime);o.frequency.exponentialRampToValueAtTime(880,a.currentTime+0.15);g.gain.setValueAtTime(0.2,a.currentTime);g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.15);}
    else if(type==='hit'){o.frequency.setValueAtTime(150,a.currentTime);g.gain.setValueAtTime(0.4,a.currentTime);g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.1);}
    else if(type==='combo'){o.type='triangle';o.frequency.setValueAtTime(660*Math.min(combo,5),a.currentTime);g.gain.setValueAtTime(0.15,a.currentTime);g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.1);}
    o.start(a.currentTime); o.stop(a.currentTime+0.3);
  }catch(e){}
}

function burst(x,y,color,n=12,speed=4){
  for(let i=0;i<n;i++){
    const a=Math.PI*2*i/n+Math.random()*0.5;
    const s=speed*(0.5+Math.random());
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:2+Math.random()*4,color,life:1,decay:0.02+Math.random()*0.04,glow:true});
  }
}

function showCombo(){
  if(combo<2) return;
  const el=document.getElementById('combo-display');
  const txt=document.getElementById('comboText');
  el.style.display='block';
  const msgs=['','','2x コンボ!','3x COMBO!','4x MEGA!','5x+ ULTRA!!!'];
  txt.textContent=combo>=5?'⚡ ULTRA COMBO! ⚡':(msgs[Math.min(combo,5)]);
  txt.style.fontSize=Math.min(28+combo*4,52)+'px';
  comboTimer=120;
}

function showLevelUp(){
  const el=document.getElementById('level-up');
  const txt=document.getElementById('lvlText');
  txt.textContent=`🌟 المستوى ${level} 🌟`;
  el.style.display='block';
  setTimeout(()=>el.style.display='none',2000);
}

function applyPowerup(type){
  playSound('powerup');
  if(type==='shield'){player.shield=true;player.shieldT=300;}
  else if(type==='rapid'){player.rapid=true;player.rapidT=300;}
  else if(type==='spread'){player.spread=true;player.spreadT=300;}
  else if(type==='bomb'){
    // Nuke all enemies
    enemies.forEach(e=>{
      burst(e.x,e.y,e.color,20,6);
      score+=e.pts;kills++;
    });
    enemies=[];
    bossBullets=[];
    burst(W/2,H/2,'#ff8800',50,12);
    screenShake=30;
  }
  else if(type==='health'){ if(lives<5) lives++; }
  updateHUD();
}

// Drawing
function drawPlayer(){
  const p=player;
  ctx.save();
  if(screenShake>0){ctx.translate((Math.random()-0.5)*screenShake*0.3,(Math.random()-0.5)*screenShake*0.3);}

  // Engine flames
  const flameH=20+Math.sin(frame*0.3)*6;
  const flameGrd=ctx.createLinearGradient(p.x,p.y+p.h/2,p.x,p.y+p.h/2+flameH+10);
  flameGrd.addColorStop(0,'rgba(0,150,255,0.9)');
  flameGrd.addColorStop(0.5,'rgba(255,100,0,0.6)');
  flameGrd.addColorStop(1,'transparent');
  ctx.fillStyle=flameGrd;
  ctx.beginPath();
  ctx.moveTo(p.x-10,p.y+p.h/2);
  ctx.lineTo(p.x+10,p.y+p.h/2);
  ctx.lineTo(p.x,p.y+p.h/2+flameH+10);
  ctx.fill();

  // Ship glow
  ctx.shadowBlur=invTimer>0?25:12;
  ctx.shadowColor=invTimer>0?'#ffffff':'#00aaff';

  // Ship body
  const alpha=invTimer>0&&Math.floor(frame/4)%2===0?0.4:1;
  ctx.globalAlpha=alpha;

  // Main body
  ctx.fillStyle='#1a1a3e';
  ctx.beginPath();
  ctx.moveTo(p.x,p.y-p.h/2);
  ctx.lineTo(p.x+p.w/2,p.y+p.h/3);
  ctx.lineTo(p.x+p.w*0.3,p.y+p.h/2);
  ctx.lineTo(p.x-p.w*0.3,p.y+p.h/2);
  ctx.lineTo(p.x-p.w/2,p.y+p.h/3);
  ctx.closePath();
  ctx.fill();

  // Hull stripe
  ctx.fillStyle='#003399';
  ctx.beginPath();
  ctx.moveTo(p.x,p.y-p.h/2+8);
  ctx.lineTo(p.x+14,p.y+p.h/3-4);
  ctx.lineTo(p.x-14,p.y+p.h/3-4);
  ctx.closePath();
  ctx.fill();

  // Cockpit
  const cgrd=ctx.createRadialGradient(p.x,p.y-6,0,p.x,p.y-6,14);
  cgrd.addColorStop(0,'#aaddff');
  cgrd.addColorStop(0.5,'#0055ff');
  cgrd.addColorStop(1,'#001133');
  ctx.fillStyle=cgrd;
  ctx.beginPath();
  ctx.ellipse(p.x,p.y-6,10,14,0,0,Math.PI*2);
  ctx.fill();

  // Wing accents
  ctx.strokeStyle='#00aaff';
  ctx.lineWidth=1.5;
  ctx.shadowBlur=8;
  ctx.shadowColor='#00aaff';
  ctx.beginPath();
  ctx.moveTo(p.x-p.w/2,p.y+p.h/3);
  ctx.lineTo(p.x-p.w*0.3,p.y);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(p.x+p.w/2,p.y+p.h/3);
  ctx.lineTo(p.x+p.w*0.3,p.y);
  ctx.stroke();

  // Shield bubble
  if(p.shield){
    ctx.globalAlpha=0.4+Math.sin(frame*0.1)*0.2;
    ctx.strokeStyle='#00aaff';
    ctx.lineWidth=3;
    ctx.shadowBlur=20;
    ctx.shadowColor='#00aaff';
    ctx.beginPath();
    ctx.arc(p.x,p.y,40,0,Math.PI*2);
    ctx.stroke();
  }

  ctx.globalAlpha=1;
  ctx.shadowBlur=0;
  ctx.restore();
}

function drawEnemy(e){
  ctx.save();
  ctx.font=`${e.w}px serif`;
  ctx.textAlign='center';
  ctx.textBaseline='middle';

  // Shadow/glow
  ctx.shadowBlur=15;
  ctx.shadowColor=e.color;
  ctx.fillText(e.emoji,e.x,e.y);

  // HP bar
  if(e.hp<e.maxHp){
    const bw=e.w+20,bh=5;
    const bx=e.x-bw/2,by=e.y+e.h/2+5;
    ctx.shadowBlur=0;
    ctx.fillStyle='rgba(0,0,0,0.6)';
    ctx.fillRect(bx,by,bw,bh);
    const pct=e.hp/e.maxHp;
    const hcol=pct>0.5?'#00ff88':pct>0.25?'#ffaa00':'#ff2244';
    ctx.fillStyle=hcol;
    ctx.fillRect(bx,by,bw*pct,bh);
  }

  // Boss HP bar at top
  if(e.isBoss){
    const bw=W*0.7,bh=10;
    const bx=(W-bw)/2,by=80;
    ctx.shadowBlur=0;
    ctx.fillStyle='rgba(0,0,0,0.8)';
    ctx.fillRect(bx-2,by-2,bw+4,bh+4);
    ctx.fillStyle='#330000';
    ctx.fillRect(bx,by,bw,bh);
    const pct=e.hp/e.maxHp;
    const grad=ctx.createLinearGradient(bx,0,bx+bw,0);
    grad.addColorStop(0,'#ff0000');
    grad.addColorStop(0.5,'#ff6600');
    grad.addColorStop(1,'#ffaa00');
    ctx.fillStyle=grad;
    ctx.fillRect(bx,by,bw*pct,bh);
    ctx.fillStyle='#fff';
    ctx.font='bold 11px Cairo';
    ctx.textAlign='center';
    ctx.fillText(`👹 BOSS — ${Math.ceil(e.hp)}/${Math.ceil(e.maxHp)}`,W/2,by-4);
  }

  ctx.restore();
}

function drawBullet(b){
  ctx.save();
  const g=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r+6);
  g.addColorStop(0,'#fff');
  g.addColorStop(0.4,b.color||'#00ccff');
  g.addColorStop(1,'transparent');
  ctx.fillStyle=g;
  ctx.beginPath();ctx.arc(b.x,b.y,b.r+6,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function drawPowerup(p){
  ctx.save();
  const pulse=1+Math.sin(frame*0.1)*0.15;
  ctx.shadowBlur=20;
  ctx.shadowColor=PU_COLORS[p.type];
  ctx.font=`${32*pulse}px serif`;
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText(PU_EMOJIS[p.type],p.x,p.y);
  // Ring
  ctx.strokeStyle=PU_COLORS[p.type];
  ctx.lineWidth=2;
  ctx.globalAlpha=0.5+Math.sin(frame*0.1)*0.3;
  ctx.beginPath();ctx.arc(p.x,p.y,24*pulse,0,Math.PI*2);ctx.stroke();
  ctx.restore();
}

// Main loop
function loop(){
  if(gs!=='playing'){requestAnimationFrame(loop);return;}
  requestAnimationFrame(loop);
  frame++;

  // Clear
  ctx.fillStyle='#000008';
  ctx.fillRect(0,0,W,H);

  // Stars
  for(const s of stars){
    s.y+=s.speed;
    if(s.y>H){s.y=0;s.x=Math.random()*W;}
    ctx.globalAlpha=s.a*(0.5+Math.sin(frame*0.02+s.x)*0.3);
    ctx.fillStyle=s.color;
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;

  // Nebula bg
  if(frame%3===0){
    const ngrd=ctx.createRadialGradient(W*0.3,H*0.2,0,W*0.3,H*0.2,200);
    ngrd.addColorStop(0,'rgba(0,30,80,0.03)');
    ngrd.addColorStop(1,'transparent');
    ctx.fillStyle=ngrd;
    ctx.fillRect(0,0,W,H);
  }

  // Player movement
  if(playerTargetX!==null){
    const diff=playerTargetX-player.x;
    if(Math.abs(diff)>3) player.dx=diff*0.18;
    else player.dx=0;
  }
  if(inputL) player.dx=-player.speed;
  if(inputR) player.dx=player.speed;
  if(!inputL&&!inputR&&playerTargetX===null) player.dx*=0.8;
  player.x=Math.max(player.w/2,Math.min(W-player.w/2,player.x+player.dx));

  // Auto/manual fire
  const fr=player.rapid?6:player.fireRate;
  if((inputF||autoFire)&&frame-lastFire>fr){
    shoot();lastFire=frame;
  }

  // Timers
  if(invTimer>0) invTimer--;
  if(player.shieldT>0){player.shieldT--;if(player.shieldT===0)player.shield=false;}
  if(player.rapidT>0){player.rapidT--;if(player.rapidT===0)player.rapid=false;}
  if(player.spreadT>0){player.spreadT--;if(player.spreadT===0)player.spread=false;}
  if(screenShake>0) screenShake--;
  if(comboTimer>0){comboTimer--;if(comboTimer===0){document.getElementById('combo-display').style.display='none';combo=0;}}

  // Spawning
  const spawnRate=Math.max(35,90-(level-1)*8);
  if(frame%spawnRate===0&&!bossAlive) spawnEnemy();

  // Boss spawn
  const bossAt=[10,25,50,100,200];
  if(!bossAlive&&kills>0&&bossAt.includes(kills)) spawnBoss();

  // Bullets (player)
  bullets=bullets.filter(b=>b.y>-20&&b.x>-20&&b.x<W+20);
  for(const b of bullets){b.x+=b.vx;b.y+=b.vy;drawBullet(b);}

  // Boss bullets
  bossBullets=bossBullets.filter(b=>b.y<H+20&&b.x>-20&&b.x<W+20);
  for(const b of bossBullets){
    b.x+=b.vx;b.y+=b.vy;
    ctx.save();
    const g=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,10);
    g.addColorStop(0,'#fff');g.addColorStop(0.5,'#ff4400');g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(b.x,b.y,10,0,Math.PI*2);ctx.fill();
    ctx.restore();
    // Hit player
    if(!invTimer&&Math.hypot(b.x-player.x,b.y-player.y)<30){
      bossBullets.splice(bossBullets.indexOf(b),1);
      hitPlayer();
    }
  }

  // Powerups
  powerups=powerups.filter(p=>p.y<H+40);
  for(const p of powerups){
    p.y+=1.5;
    drawPowerup(p);
    if(Math.hypot(p.x-player.x,p.y-player.y)<36){
      applyPowerup(p.type);
      burst(p.x,p.y,PU_COLORS[p.type],16);
      powerups.splice(powerups.indexOf(p),1);
    }
  }

  // Enemies
  for(let ei=enemies.length-1;ei>=0;ei--){
    const e=enemies[ei];
    e.t++;

    // Movement patterns
    if(e.isBoss){
      e.x+=e.dx;
      if(e.x<e.w||e.x>W-e.w) e.dx*=-1;
      if(e.y<120) e.y+=1.5;
      // Phase attacks
      if(e.hp<e.maxHp*0.5&&e.phase===0){e.phase=1;e.dx*=1.5;}
      if(e.shootTimer++>e.shootRate){
        e.shootTimer=0;
        // Multi-shot
        for(let a=-2;a<=2;a++){
          bossBullets.push({x:e.x,y:e.y+e.h/2,vx:a*2,vy:4});
        }
        if(e.phase===1){
          // Aimed shot
          const ang=Math.atan2(player.y-e.y,player.x-e.x);
          bossBullets.push({x:e.x,y:e.y+e.h/2,vx:Math.cos(ang)*5,vy:Math.sin(ang)*5});
        }
      }
    } else {
      // Pattern movement
      switch(e.pattern){
        case 0: e.y+=e.speed; e.x+=Math.sin(e.t*0.04)*e.sway*2; break;
        case 1: e.y+=e.speed*0.7; e.x+=e.dx+(e.sway*Math.cos(e.t*0.05)*3); break;
        case 2: // Dive toward player
          const ang2=Math.atan2(player.y-e.y,player.x-e.x);
          if(e.y<H*0.3) e.y+=e.speed;
          else{e.x+=Math.cos(ang2)*e.speed*0.5;e.y+=Math.sin(ang2)*e.speed*0.5;}
          break;
      }
      if(e.dx) e.x+=e.dx*e.speed;
      if(e.shoot&&e.shootTimer++>e.shootRate){
        e.shootTimer=0;
        const ang=Math.atan2(player.y-e.y,player.x-e.x);
        bossBullets.push({x:e.x,y:e.y+e.h/2,vx:Math.cos(ang)*3.5,vy:Math.sin(ang)*3.5});
      }
    }

    drawEnemy(e);

    // Off screen
    if(e.y>H+80||e.x<-100||e.x>W+100){
      enemies.splice(ei,1);
      if(!e.isBoss&&!e.explode) combo=0;
      continue;
    }

    // Enemy hits player
    if(!invTimer&&Math.abs(e.x-player.x)<(e.w/2+player.w/2-8)&&Math.abs(e.y-player.y)<(e.h/2+player.h/2-8)){
      if(e.explode){burst(e.x,e.y,'#ff4400',25,8);screenShake=20;}
      enemies.splice(ei,1);
      hitPlayer();
      continue;
    }

    // Bullet hits enemy
    for(let bi=bullets.length-1;bi>=0;bi--){
      const b=bullets[bi];
      if(Math.abs(b.x-e.x)<e.w/2+b.r&&Math.abs(b.y-e.y)<e.h/2+b.r){
        bullets.splice(bi,1);
        e.hp-=b.power||1;
        burst(b.x,b.y,'#fff',4,2);
        if(e.hp<=0){
          // Kill
          burst(e.x,e.y,e.color,e.isBoss?40:16,e.isBoss?8:4);
          playSound('explode');
          score+=e.pts*(combo>0?Math.min(combo,5):1);
          kills++;
          combo++;
          showCombo();
          comboTimer=150;
          if(frame-lastFire>fr) playSound('combo');
          // Drop powerup
          if(Math.random()<(e.isBoss?1:0.15)){
            const types=e.isBoss?PU_TYPES:PU_TYPES.filter(t=>t!=='bomb');
            powerups.push({x:e.x,y:e.y,type:types[Math.floor(Math.random()*types.length)]});
          }
          if(e.isBoss){bossAlive=false;screenShake=40;}
          enemies.splice(ei,1);
          // XP & Level
          xp++;
          if(xp>=xpNeeded){xp=0;xpNeeded=Math.floor(xpNeeded*1.5);level++;showLevelUp();}
          updateHUD();
          break;
        } else {
          burst(b.x,b.y,e.color,5,2);
          screenShake=Math.max(screenShake,3);
        }
      }
    }
  }

  // Particles
  for(let pi=particles.length-1;pi>=0;pi--){
    const p=particles[pi];
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.08;p.life-=p.decay;
    if(p.life<=0){particles.splice(pi,1);continue;}
    ctx.globalAlpha=p.life;
    if(p.glow){ctx.shadowBlur=10;ctx.shadowColor=p.color;}
    ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
  }
  ctx.globalAlpha=1;

  drawPlayer();
}

function hitPlayer(){
  if(player.shield){
    player.shield=false;player.shieldT=0;
    burst(player.x,player.y,'#00aaff',20);
    screenShake=10;
    return;
  }
  lives--;
  invTimer=120;
  screenShake=15;
  playSound('hit');
  const f=document.getElementById('dmg-flash');
  f.style.opacity='1';
  setTimeout(()=>f.style.opacity='0',150);
  updateHUD();
  if(lives<=0) endGame();
}

function endGame(){
  gs='dead';
  if(score>best){best=score;localStorage.setItem('best',best);}
  document.getElementById('oScore').textContent=score;
  document.getElementById('oLevel').textContent=level;
  document.getElementById('oBest').textContent=best;
  document.getElementById('oKills').textContent=kills;
  document.getElementById('overScreen').style.display='flex';
  document.getElementById('screen').style.display='flex';
  document.getElementById('ui').style.display='none';
  document.getElementById('controls').style.display='none';
}

function startGame(){
  document.getElementById('screen').style.display='none';
  document.getElementById('ui').style.display='block';
  document.getElementById('controls').style.display='flex';
  gs='playing';
  initGame();
  loop();
}

function showStart(){
  gs='start';
  document.getElementById('overScreen').style.display='none';
  document.getElementById('startScreen').style.display='flex';
  document.getElementById('screen').style.display='flex';
}

// Touch controls
let touchId={left:null,right:null,fire:null};
document.getElementById('controls').addEventListener('touchstart',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    const el=document.elementFromPoint(t.clientX,t.clientY);
    if(el&&el.id==='btnL'||el&&el.closest&&el.closest('#ctrl-left')){inputL=true;document.getElementById('btnL').classList.add('active');}
    else if(el&&el.id==='btnR'||el&&el.closest&&el.closest('#ctrl-right')){inputR=true;document.getElementById('btnR').classList.add('active');}
    else if(el&&el.closest&&el.closest('#ctrl-fire')){inputF=true;document.getElementById('btnF').classList.add('active');}
  }
},{passive:false});
document.getElementById('controls').addEventListener('touchend',e=>{
  e.preventDefault();
  inputL=false;inputR=false;inputF=false;
  document.getElementById('btnL').classList.remove('active');
  document.getElementById('btnR').classList.remove('active');
  document.getElementById('btnF').classList.remove('active');
},{passive:false});

// Swipe to move
let swipeStartX=null;
C.addEventListener('touchstart',e=>{
  e.preventDefault();
  swipeStartX=e.touches[0].clientX;
  playerTargetX=e.touches[0].clientX;
  inputF=true;
},{passive:false});
C.addEventListener('touchmove',e=>{
  e.preventDefault();
  playerTargetX=e.touches[0].clientX;
},{passive:false});
C.addEventListener('touchend',e=>{
  e.preventDefault();
  playerTargetX=null;
  inputF=false;
},{passive:false});

// Keyboard
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft') inputL=true;
  if(e.key==='ArrowRight') inputR=true;
  if(e.key===' '||e.key==='z') inputF=true;
});
document.addEventListener('keyup',e=>{
  if(e.key==='ArrowLeft') inputL=false;
  if(e.key==='ArrowRight') inputR=false;
  if(e.key===' '||e.key==='z') inputF=false;
});

// Mouse
C.addEventListener('mousemove',e=>{if(gs==='playing')playerTargetX=e.clientX;});
C.addEventListener('mousedown',e=>{if(gs==='playing'){playerTargetX=e.clientX;inputF=true;}});
C.addEventListener('mouseup',()=>inputF=false);

// Background loop for start screen
initStars();
(function bgLoop(){
  if(gs==='start'||gs==='dead'){
    ctx.fillStyle='#000008';
    ctx.fillRect(0,0,W,H);
    for(const s of stars){
      s.y+=s.speed*0.3;if(s.y>H){s.y=0;s.x=Math.random()*W;}
      ctx.globalAlpha=s.a*0.5;ctx.fillStyle=s.color;
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;
  }
  requestAnimationFrame(bgLoop);
})();

loop();
</script>
