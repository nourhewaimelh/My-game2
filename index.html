<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>نجم الفضاء - لعبة أكشن</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Cairo:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Cairo', sans-serif;
    touch-action: none;
  }

  #gameWrapper {
    position: relative;
    width: 100%;
    max-width: 420px;
    height: 100vh;
    max-height: 780px;
    overflow: hidden;
    background: #000010;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  #ui {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 14px 18px;
    pointer-events: none;
    z-index: 10;
  }

  .score-box {
    background: rgba(0,200,255,0.08);
    border: 1px solid rgba(0,200,255,0.3);
    border-radius: 12px;
    padding: 6px 14px;
    text-align: center;
  }
  .score-label {
    font-family: 'Cairo', sans-serif;
    font-size: 10px;
    color: rgba(0,200,255,0.6);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .score-value {
    font-family: 'Orbitron', sans-serif;
    font-size: 20px;
    font-weight: 900;
    color: #00c8ff;
    text-shadow: 0 0 10px #00c8ff;
  }

  #lives {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 8px 14px;
    background: rgba(255,50,80,0.08);
    border: 1px solid rgba(255,50,80,0.3);
    border-radius: 12px;
  }
  .heart { font-size: 18px; }

  /* Screens */
  .screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 20;
    background: radial-gradient(ellipse at center, #000830 0%, #000000 100%);
  }

  .screen-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 32px;
    font-weight: 900;
    color: #fff;
    text-align: center;
    text-shadow: 0 0 30px #00c8ff, 0 0 60px #0050ff;
    margin-bottom: 8px;
    line-height: 1.2;
  }
  .screen-subtitle {
    font-size: 14px;
    color: rgba(0,200,255,0.7);
    text-align: center;
    margin-bottom: 40px;
  }

  .btn {
    font-family: 'Cairo', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: #000;
    background: linear-gradient(135deg, #00c8ff, #0070ff);
    border: none;
    border-radius: 50px;
    padding: 16px 50px;
    cursor: pointer;
    box-shadow: 0 0 30px rgba(0,150,255,0.5);
    transition: transform 0.1s, box-shadow 0.1s;
    touch-action: manipulation;
    margin: 6px;
  }
  .btn:active { transform: scale(0.96); box-shadow: 0 0 15px rgba(0,150,255,0.3); }

  .btn-secondary {
    background: transparent;
    color: rgba(0,200,255,0.7);
    border: 1px solid rgba(0,200,255,0.3);
    box-shadow: none;
    font-size: 14px;
    padding: 10px 30px;
  }

  #finalScore {
    font-family: 'Orbitron', sans-serif;
    font-size: 48px;
    font-weight: 900;
    color: #00c8ff;
    text-shadow: 0 0 20px #00c8ff;
    margin: 10px 0 4px;
  }
  #highScoreLabel {
    font-size: 13px;
    color: #ffd700;
    margin-bottom: 30px;
  }

  /* Controls hint */
  #controlsHint {
    position: absolute;
    bottom: 20px;
    left: 0; right: 0;
    text-align: center;
    font-size: 12px;
    color: rgba(255,255,255,0.3);
    pointer-events: none;
    z-index: 10;
  }

  /* Stars bg decoration */
  .star-bg {
    position: absolute;
    width: 2px; height: 2px;
    background: white;
    border-radius: 50%;
    animation: twinkle 2s infinite alternate;
  }
  @keyframes twinkle { from { opacity: 0.2; } to { opacity: 1; } }

  #hidden { display: none !important; }
</style>
</head>
<body>
<div id="gameWrapper">
  <canvas id="gameCanvas"></canvas>

  <!-- HUD -->
  <div id="ui">
    <div class="score-box">
      <div class="score-label">النقاط</div>
      <div class="score-value" id="scoreDisplay">0</div>
    </div>
    <div class="score-box">
      <div class="score-label">المستوى</div>
      <div class="score-value" id="levelDisplay">1</div>
    </div>
    <div id="lives">
      <span class="heart" id="h1">❤️</span>
      <span class="heart" id="h2">❤️</span>
      <span class="heart" id="h3">❤️</span>
    </div>
  </div>

  <div id="controlsHint">اضغط يسار/يمين للتحرك • اضغط المركز للإطلاق</div>

  <!-- Start Screen -->
  <div class="screen" id="startScreen">
    <div style="font-size:64px;margin-bottom:16px;">🚀</div>
    <div class="screen-title">نجم<br>الفضاء</div>
    <div class="screen-subtitle">دافع عن المجرة من الغزاة!</div>
    <button class="btn" onclick="startGame()">ابدأ اللعب</button>
    <div style="margin-top:20px;color:rgba(255,255,255,0.4);font-size:12px;text-align:center;">
      اسحب للتحرك • اضغط لإطلاق النار
    </div>
  </div>

  <!-- Game Over Screen -->
  <div class="screen hidden" id="gameOverScreen" style="display:none;">
    <div style="font-size:52px;margin-bottom:10px;">💥</div>
    <div class="screen-title" style="font-size:26px;">انتهت اللعبة!</div>
    <div id="finalScore">0</div>
    <div id="highScoreLabel"></div>
    <button class="btn" onclick="startGame()">العب مجدداً</button>
    <button class="btn btn-secondary" onclick="showStart()">القائمة الرئيسية</button>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const wrapper = document.getElementById('gameWrapper');

let W, H;
function resize() {
  W = canvas.width = wrapper.clientWidth;
  H = canvas.height = wrapper.clientHeight;
}
resize();
window.addEventListener('resize', resize);

// Game state
let state = 'start'; // start | playing | dead
let score = 0, highScore = 0, level = 1, lives = 3;
let player, bullets, enemies, particles, stars, powerups;
let enemySpeedMult = 1, spawnInterval = 90, frameCount = 0;
let lastEnemySpawn = 0, invincible = 0;

// Touch / input
let touchX = null, touchLeft = false, touchRight = false, touchFire = false;
let lastFireFrame = 0;

// Stars
function initStars() {
  stars = [];
  for (let i = 0; i < 80; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      speed: 0.3 + Math.random() * 1.5,
      r: Math.random() * 1.5,
      a: Math.random()
    });
  }
}

function initGame() {
  score = 0; level = 1; lives = 3;
  enemySpeedMult = 1; spawnInterval = 90; frameCount = 0;
  invincible = 0;
  player = { x: W/2, y: H - 100, w: 38, h: 44, speed: 5, dx: 0 };
  bullets = []; enemies = []; particles = []; powerups = [];
  updateHUD();
  initStars();
}

function updateHUD() {
  document.getElementById('scoreDisplay').textContent = score;
  document.getElementById('levelDisplay').textContent = level;
  const hearts = ['h1','h2','h3'];
  hearts.forEach((id, i) => {
    document.getElementById(id).textContent = i < lives ? '❤️' : '🖤';
  });
}

// Spawn enemy
function spawnEnemy() {
  const types = ['basic', 'fast', 'tank'];
  let type = 'basic';
  if (level >= 3 && Math.random() < 0.3) type = 'fast';
  if (level >= 5 && Math.random() < 0.2) type = 'tank';

  const configs = {
    basic: { w:32, h:32, hp:1, speed:1.5, color:'#ff4060', points:10, emoji:'👾' },
    fast:  { w:24, h:24, hp:1, speed:3,   color:'#ff9020', points:20, emoji:'🛸' },
    tank:  { w:44, h:44, hp:3, speed:0.8, color:'#a020ff', points:40, emoji:'🤖' }
  };
  const c = configs[type];
  enemies.push({
    x: 20 + Math.random() * (W - 40),
    y: -50,
    ...c,
    type,
    maxHp: c.hp,
    speed: c.speed * enemySpeedMult,
    sway: Math.random() * 2 - 1,
    t: 0
  });
}

// Particles
function burst(x, y, color, count=12) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 4;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      r: 2 + Math.random() * 4,
      color,
      life: 1, decay: 0.03 + Math.random() * 0.05
    });
  }
}

function drawPlayer() {
  const p = player;
  ctx.save();
  // Engine glow
  const grd = ctx.createRadialGradient(p.x, p.y + p.h/2 + 10, 2, p.x, p.y + p.h/2 + 10, 20);
  grd.addColorStop(0, 'rgba(0,150,255,0.8)');
  grd.addColorStop(1, 'transparent');
  ctx.fillStyle = grd;
  ctx.fillRect(p.x - 20, p.y + p.h/2, 40, 25);

  // Body
  ctx.shadowBlur = invincible > 0 ? 20 : 8;
  ctx.shadowColor = invincible > 0 ? '#fff' : '#00c8ff';
  ctx.fillStyle = invincible > 0 && Math.floor(frameCount/3)%2===0 ? 'rgba(255,255,255,0.5)' : '#00c8ff';
  // Ship shape
  ctx.beginPath();
  ctx.moveTo(p.x, p.y - p.h/2);         // top
  ctx.lineTo(p.x + p.w/2, p.y + p.h/2); // bottom right
  ctx.lineTo(p.x - p.w/2, p.y + p.h/2); // bottom left
  ctx.closePath();
  ctx.fill();

  // Cockpit
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#80e8ff';
  ctx.beginPath();
  ctx.ellipse(p.x, p.y, 8, 12, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawEnemy(e) {
  ctx.save();
  ctx.font = `${e.w}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(e.emoji, e.x, e.y);

  // HP bar for tanks
  if (e.type === 'tank' && e.hp < e.maxHp) {
    const bw = e.w + 10;
    ctx.fillStyle = 'rgba(255,0,0,0.5)';
    ctx.fillRect(e.x - bw/2, e.y + e.h/2 + 4, bw, 5);
    ctx.fillStyle = '#00ff80';
    ctx.fillRect(e.x - bw/2, e.y + e.h/2 + 4, bw * (e.hp/e.maxHp), 5);
  }
  ctx.restore();
}

function gameLoop() {
  if (state !== 'playing') return;
  requestAnimationFrame(gameLoop);
  frameCount++;

  ctx.fillStyle = '#000010';
  ctx.fillRect(0, 0, W, H);

  // Stars
  stars.forEach(s => {
    s.y += s.speed;
    if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
    ctx.globalAlpha = s.a;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // Player movement
  if (touchLeft)  player.dx = -player.speed;
  else if (touchRight) player.dx = player.speed;
  else player.dx *= 0.75;

  player.x = Math.max(player.w/2, Math.min(W - player.w/2, player.x + player.dx));

  // Auto-fire
  if (touchFire && frameCount - lastFireFrame > 15) {
    bullets.push({ x: player.x, y: player.y - player.h/2, speed: 12, r: 5 });
    lastFireFrame = frameCount;
  }

  // Auto fire when not dragging (single tap shoot)
  if (!touchLeft && !touchRight && frameCount - lastFireFrame > 20) {
    bullets.push({ x: player.x, y: player.y - player.h/2, speed: 12, r: 5 });
    lastFireFrame = frameCount;
  }

  // Bullets
  bullets = bullets.filter(b => b.y > -20);
  bullets.forEach(b => {
    b.y -= b.speed;
    // Trail
    const g = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r + 4);
    g.addColorStop(0, '#fff');
    g.addColorStop(0.4, '#00c8ff');
    g.addColorStop(1, 'transparent');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r + 4, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();
  });

  // Spawn enemies
  if (frameCount - lastEnemySpawn > spawnInterval) {
    spawnEnemy();
    lastEnemySpawn = frameCount;
  }

  // Enemies
  enemies.forEach((e, ei) => {
    e.t++;
    e.y += e.speed;
    e.x += Math.sin(e.t * 0.05) * e.sway;

    drawEnemy(e);

    // Hit player
    if (!invincible && Math.abs(e.x - player.x) < (e.w/2 + player.w/2 - 8) &&
        Math.abs(e.y - player.y) < (e.h/2 + player.h/2 - 8)) {
      burst(e.x, e.y, e.color, 16);
      enemies.splice(ei, 1);
      lives--;
      invincible = 90;
      updateHUD();
      if (lives <= 0) { endGame(); return; }
      return;
    }

    // Off screen
    if (e.y > H + 60) enemies.splice(ei, 1);

    // Bullet collisions
    bullets.forEach((b, bi) => {
      if (Math.abs(b.x - e.x) < e.w/2 + b.r && Math.abs(b.y - e.y) < e.h/2 + b.r) {
        e.hp--;
        bullets.splice(bi, 1);
        if (e.hp <= 0) {
          burst(e.x, e.y, e.color, 18);
          score += e.points;
          enemies.splice(ei, 1);
          updateHUD();
          // Level up
          const newLevel = Math.floor(score / 200) + 1;
          if (newLevel > level) {
            level = newLevel;
            enemySpeedMult = 1 + (level-1) * 0.18;
            spawnInterval = Math.max(30, 90 - level * 8);
          }
        } else {
          burst(e.x, e.y, '#fff', 5);
        }
      }
    });
  });

  // Particles
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.1;
    p.life -= p.decay;
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha = 1;

  if (invincible > 0) invincible--;

  drawPlayer();
}

function startGame() {
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('gameOverScreen').style.display = 'none';
  state = 'playing';
  initGame();
  gameLoop();
}

function endGame() {
  state = 'dead';
  if (score > highScore) highScore = score;
  document.getElementById('finalScore').textContent = score;
  document.getElementById('highScoreLabel').textContent =
    score >= highScore ? `🏆 أعلى نقاط: ${highScore}` : `أعلى نقاط: ${highScore}`;
  document.getElementById('gameOverScreen').style.display = 'flex';
}

function showStart() {
  state = 'start';
  document.getElementById('gameOverScreen').style.display = 'none';
  document.getElementById('startScreen').style.display = 'flex';
}

// --- Touch Controls ---
// Left third = move left, right third = move right, middle = fire
wrapper.addEventListener('touchstart', e => {
  e.preventDefault();
  handleTouch(e.touches);
}, { passive: false });

wrapper.addEventListener('touchmove', e => {
  e.preventDefault();
  handleTouch(e.touches);
}, { passive: false });

wrapper.addEventListener('touchend', e => {
  e.preventDefault();
  touchLeft = false; touchRight = false; touchFire = false;
  if (e.touches.length > 0) handleTouch(e.touches);
}, { passive: false });

function handleTouch(touches) {
  touchLeft = false; touchRight = false; touchFire = false;
  for (let t of touches) {
    const tx = t.clientX - wrapper.getBoundingClientRect().left;
    const rel = tx / W;
    if (rel < 0.35) touchLeft = true;
    else if (rel > 0.65) touchRight = true;
    else touchFire = true;

    // Also move player toward touch X smoothly
    if (state === 'playing') {
      const diff = tx - player.x;
      if (Math.abs(diff) > 10) player.dx = Math.sign(diff) * Math.min(Math.abs(diff) * 0.15, player.speed * 1.5);
    }
  }
}

// Mouse fallback for desktop testing
let mouseDown = false;
wrapper.addEventListener('mousedown', e => {
  mouseDown = true;
  const mx = e.clientX - wrapper.getBoundingClientRect().left;
  const rel = mx / W;
  if (rel < 0.35) touchLeft = true;
  else if (rel > 0.65) touchRight = true;
  else touchFire = true;
});
wrapper.addEventListener('mousemove', e => {
  if (!mouseDown) return;
  if (state === 'playing') {
    const mx = e.clientX - wrapper.getBoundingClientRect().left;
    player.x = Math.max(player.w/2, Math.min(W - player.w/2, mx));
  }
});
wrapper.addEventListener('mouseup', () => {
  mouseDown = false;
  touchLeft = false; touchRight = false; touchFire = false;
});

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft')  touchLeft = true;
  if (e.key === 'ArrowRight') touchRight = true;
  if (e.key === ' ') touchFire = true;
});
document.addEventListener('keyup', e => {
  if (e.key === 'ArrowLeft')  touchLeft = false;
  if (e.key === 'ArrowRight') touchRight = false;
  if (e.key === ' ') touchFire = false;
});

// Draw stars on start screen
(function animateBg() {
  if (state !== 'playing') {
    requestAnimationFrame(animateBg);
    if (!stars) initStars();
    ctx.fillStyle = '#000010';
    ctx.fillRect(0,0,W,H);
    stars.forEach(s => {
      s.y += s.speed * 0.4;
      if (s.y > H) { s.y = 0; s.x = Math.random()*W; }
      ctx.globalAlpha = s.a * 0.6;
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha = 1;
  }
})();

initStars();
</script>
</body>
</html>
